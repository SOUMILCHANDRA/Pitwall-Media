<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --team-color: #e10600; /* Dynamic team accent color */
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: #030303;
            /* Dynamic glowing back-aura that scales with team identity */
            background-image: 
                radial-gradient(circle at 85% 20%, var(--team-color) 0%, transparent 50%),
                linear-gradient(145deg, #0a0a0a 0%, #020202 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 90px;
            overflow: hidden;
        }
        /* Geometric layout boundary grid */
        body::before {
            content: ''; position: absolute; top: 45px; left: 45px; right: 45px; bottom: 45px;
            border: 1px solid rgba(255, 255, 255, 0.03); pointer-events: none;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 25px;
        }
        .session-tag {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #8e8e93;
            font-weight: 700;
        }
        #brand-logo {
            max-height: 45px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.05));
        }
        #driver-logo {
            max-height: 55px;
            max-width: 250px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.1));
        }
        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            margin-top: 40px;
        }
        .stat-wrapper {
            display: flex;
            align-items: flex-end;
            margin-bottom: -10px;
        }
        .accent-strip {
            width: 14px;
            height: 150px;
            background: var(--team-color);
            margin-right: 35px;
            box-shadow: 0 0 40px var(--team-color);
        }
        .stat-callout {
            font-size: 190px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -6px;
            font-variant-numeric: tabular-nums;
        }
        .headline {
            font-size: 62px;
            font-weight: 900;
            margin: 35px 0 20px 0;
            line-height: 1.1;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .caption {
            font-size: 27px;
            color: #d1d1d6;
            line-height: 1.55;
            max-width: 860px;
            font-weight: 400;
            border-left: 3px solid rgba(255, 255, 255, 0.1);
            padding-left: 30px;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #444446;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <img id="brand-logo" src="" alt="" style="display: none;" />
        <div class="session-tag" id="session-tag">TELEMETRY ANALYSIS</div>
        <img id="driver-logo" src="" alt="" style="display: none;" />
    </div>
    
    <div class="main-content">
        <div class="stat-wrapper">
            <div class="accent-strip"></div>
            <div class="stat-callout" id="stat-callout">0.0s</div>
        </div>
        <div class="headline" id="headline">DATA OUTLIER</div>
        <div class="caption" id="caption">Pipeline synchronized successfully...</div>
    </div>
    
    <div class="footer">
        <div>PITWALL ANALYTICS ENGINE // OPEN-SOURCE TELEMETRY</div>
    </div>

    <script>
        // Bound context executed via Playwright's page.evaluate()
        window.setData = function(data) {
            document.getElementById('stat-callout').innerText = data.stat_callout;
            document.getElementById('headline').innerText = data.headline;
            document.getElementById('caption').innerText = data.caption;
            
            if(data.session_text) {
                document.getElementById('session-tag').innerText = data.session_text;
            }
            
            // Apply high-contrast team coloring profiles dynamically
            if(data.color || data.team_color) {
                const color = data.color || data.team_color;
                document.documentElement.style.setProperty('--team-color', color);
                document.getElementById('stat-callout').style.color = color;
            }
            
            // Handle logo asset presence safely
            const logoEl = document.getElementById('driver-logo');
            if (data.logo_path) {
                logoEl.src = data.logo_path;
                logoEl.style.display = 'block';
            } else {
                logoEl.style.display = 'none';
            }

            // Handle brand logo asset presence safely
            const brandLogoEl = document.getElementById('brand-logo');
            if (data.brand_logo_path) {
                brandLogoEl.src = data.brand_logo_path;
                brandLogoEl.style.display = 'block';
            } else {
                brandLogoEl.style.display = 'none';
            }
        }

        // Backward compatibility structural alias mapping wrapper hook
        function updateTemplate(data) {
            window.setData(data);
        }
    </script>
</body>
</html>
